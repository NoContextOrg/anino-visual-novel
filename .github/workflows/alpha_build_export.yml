name: Alpha Build Export

on:
  push:
    branches:
      - main

jobs:
  export_builds:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Build Directories
        run: mkdir -p builds/windows builds/web

      # Cache Docker layers (huge speed boost after first run)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Build custom Godot CI image (future-proof deps)
      - name: Build Godot CI Image
        run: |
          cat <<EOF > Dockerfile
          FROM barichello/godot-ci:mono-4.6

          RUN apt-get update && apt-get install -y \
              fontconfig \
              libx11-6 \
              libxcursor1 \
              libxinerama1 \
              libpulse0 \
              && rm -rf /var/lib/apt/lists/*
          EOF

          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            -t godot-ci-font \
            .

      # Move cache (required workaround)
      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Install Export Templates
        run: |
          docker run --rm \
            -v "$PWD":/project \
            -w /project \
            godot-ci-font \
            godot --headless /project/project.godot --install-templates

      - name: Export Windows Build
        run: |
          docker run --rm \
            -v "$PWD":/project \
            -w /project \
            godot-ci-font \
            godot --headless /project/project.godot \
            --export-release "Windows Desktop" builds/windows/Alpha.exe

      - name: Export Web Build
        run: |
          docker run --rm \
            -v "$PWD":/project \
            -w /project \
            godot-ci-font \
            godot --headless /project/project.godot \
            --export-release "HTML5" builds/web/Alpha.html

      - uses: actions/upload-artifact@v4
        with:
          name: Alpha-Windows
          path: builds/windows/Alpha.exe

      - uses: actions/upload-artifact@v4
        with:
          name: Alpha-Web
          path: builds/web/Alpha.html