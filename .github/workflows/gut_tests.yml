name: GUT Tests

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the PR code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Verify/Download GUT addon
      - name: Setup GUT addon
        run: |
          if [ ! -d "addons/gut" ]; then
            mkdir -p addons
            cd addons
            git clone --depth 1 https://github.com/bitwes/Gut.git gut
            cd ..
          fi
          echo "✓ GUT addon ready"

      # Step 3: Verify GUT config exists
      - name: Verify GUT configuration
        run: |
          if [ ! -f ".gutconfig.json" ]; then
            echo "⚠ .gutconfig.json not found"
            exit 1
          fi
          echo "✓ GUT config verified"

      # Step 4: Run Godot tests in headless mode
      - name: Run GUT tests
        run: |
          docker run --rm \
            -v "$PWD":/project \
            -w /project \
            barichello/godot-ci:mono-4.6 \
            godot --headless --path /project -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json -gexit

      # Step 5: Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gut-test-results
          path: |
            test_results/
            .godot/
          retention-days: 7