name: GUT Tests

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: abarichello/godot-ci@master
        with:
          args: --version

      - name: Download GUT addon
        run: |
          mkdir -p addons
          cd addons
          git clone https://github.com/bitwes/Gut.git gut

      - name: Run GUT tests
        uses: abarichello/godot-ci@master
        with:
          args: --headless -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json -gexit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gut-test-results
          path: test_results/
          retention-days: 7