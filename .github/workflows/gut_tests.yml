name: GUT Tests

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the PR code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Verify GUT addon exists
      - name: Check GUT addon
        run: |
          if [ -d "addons/gut" ]; then
            echo "✓ GUT addon found locally"
          else
            echo "⚠ GUT addon not found, downloading..."
            mkdir -p addons
            cd addons
            git clone --depth 1 https://github.com/bitwes/Gut.git gut
          fi

      # Step 3: Verify test configuration
      - name: Check GUT config
        run: |
          if [ ! -f ".gutconfig.json" ]; then
            echo "Error: .gutconfig.json not found"
            exit 1
          fi
          echo "✓ GUT configuration found"

      # Step 4: Run Godot tests in headless mode
      - name: Run GUT tests
        uses: abarichello/godot-ci@master
        with:
          args: --headless --path . -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json -gexit

      # Step 5: Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gut-test-results
          path: test_results/
          retention-days: 7
          if-no-files-found: warn